<!DOCTYPE html>
<html>
<head>
  <title>ClientPing AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f7fb;
    }
    .header {
      background: #0b1f3a;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }
    .container {
      padding: 15px;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    button {
      background: #0b1f3a;
      color: white;
      border: none;
    }
    .card {
      background: white;
      padding: 12px;
      border-radius: 10px;
      margin-top: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<div class="header">ClientPing AI</div>

<div class="container" id="authBox">
  <h3>Login / Signup</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>
</div>

<div class="container" id="appBox" style="display:none;">
  <h3>Add Client</h3>
  <input id="name" placeholder="Client Name">
  <input id="phone" placeholder="Phone">
  <button onclick="addClient()">Add Client</button>

  <h3>Your Clients</h3>
  <div id="clientList"></div>
</div>

<script>
const SUPABASE_URL = "https://aeprgqutctiiwdmnsyxv.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFlcHJncXV0Y3RpaXdkbW5zeXh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MzIzOTYsImV4cCI6MjA5MDIwODM5Nn0.6_n1umaY8L8JjrchLvq_tmEW9lGxa4abl5sfAT3Mlvc";

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let user = null;

async function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signUp({ email, password });

  if (error) alert(error.message);
  else alert("Signup successful!");
}

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });

  if (error) alert(error.message);
  else {
    user = data.user;
    document.getElementById("authBox").style.display = "none";
    document.getElementById("appBox").style.display = "block";
    loadClients();
  }
}

async function addClient() {
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;

  await supabase.from("clients").insert([
    { name, phone, user_id: user.id }
  ]);

  loadClients();
}

async function loadClients() {
  const { data } = await supabase.from("clients").select("*").eq("user_id", user.id);

  let html = "";
  data.forEach(c => {
    html += `
      <div class="card">
        <b>${c.name}</b><br>
        ${c.phone}<br>
        <button onclick="sendMsg('${c.phone}')">Send WhatsApp</button>
      </div>
    `;
  });

  document.getElementById("clientList").innerHTML = html;
}

function sendMsg(phone) {
  const msg = encodeURIComponent("Hello! Just checking in.");
  window.open(`https://wa.me/${phone}?text=${msg}`);
}
</script>

</body>
</html>
